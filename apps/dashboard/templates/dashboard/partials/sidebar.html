{% load static %}

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="dashboard-brand">
      <img class="dashboard-brand-logo" src="{% static 'images/brand/datapolis-logo.png' %}" alt="Datapolis">
      <span class="dashboard-brand-text dashboard-brand-text--sr-only">Datapolis</span>
    </div>
  </div>
  <nav>
    <a href="{% url 'dashboard:overview' %}" class="{% if dashboard_section == 'overview' %}active{% endif %}">
      <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12h18"/><path d="M7 7h10"/><path d="M7 17h10"/></svg>
      Mi portafolio
    </a>
    <a href="{% url 'dashboard:profile_edit' %}" class="{% if dashboard_section == 'profile' %}active{% endif %}">
      <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil público
    </a>
    <a href="{% url 'dashboard:project_list' %}" class="{% if dashboard_section == 'projects' %}active{% endif %}">
      <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 5h16v14H4z"/><path d="M8 9h8"/><path d="M8 13h8"/></svg>
      Proyectos
    </a>
    <a href="{% url 'dashboard:dataset_list' %}" class="{% if dashboard_section == 'datasets' %}active{% endif %}">
      <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><ellipse cx="12" cy="6" rx="7" ry="3"/><path d="M5 6v8c0 1.7 3.1 3 7 3s7-1.3 7-3V6"/></svg>
      Datasets
    </a>
{% if request.user.public_profile.slug %}
  <a href="{% url 'public_profile_detail' request.user.public_profile.slug %}" target="_blank" rel="noopener noreferrer">
    <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M3 12l9-8 9 8"/>
      <path d="M5 10v10h14V10"/>
    </svg>
    Ver mi portafolio público
  </a>
{% else %}
  <a href="{% url 'portfolio_projects:project_list' %}" target="_blank" rel="noopener noreferrer">
    <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M3 12l9-8 9 8"/>
      <path d="M5 10v10h14V10"/>
    </svg>
    Ver mi portafolio público
  </a>
{% endif %}
    <span class="disabled">
      <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 18V6"/><path d="M10 18V9"/><path d="M16 18v-5"/><path d="M22 18v-9"/></svg>
      Analíticas (próximamente)
    </span>
  </nav>
</aside>
