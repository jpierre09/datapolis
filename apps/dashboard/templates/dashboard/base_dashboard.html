{% load static %}

<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard Datapolis{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="{% static 'images/brand/datapolis-icono.svg' %}">
    <link rel="icon" type="image/png" href="{% static 'images/brand/datapolis-icono.png' %}">
    <link rel="stylesheet" href="{% static 'dashboard/css/dashboard.css' %}">
  </head>
  <body>
    <div class="layout">
      {% include "dashboard/partials/sidebar.html" %}

      <div class="content-shell">
        <header class="topbar">
          <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/></svg>
          </button>
          <div class="topbar-spacer"></div>
          <div class="avatar-slot">Usuario</div>
        </header>

        <main class="content">
          {% block dashboard_content %}{% endblock %}
        </main>

        <footer class="dashboard-footer">
          <div class="dashboard-footer-left">
            <span>© Datapolis 2026</span>
            <a href="#">Acerca de Datapolis</a>
            <a href="#">Documentación</a>
          </div>
          <div class="dashboard-footer-right">
            <a href="#">Privacidad</a>
            <a href="#">Términos</a>
            <a href="#">Contacto</a>
            <a href="{% url 'portfolio_projects:project_list' %}">Portafolio público</a>
          </div>
        </footer>
      </div>
    </div>

    <script>
      (function () {
        var layout = document.querySelector('.layout');
        var toggle = document.getElementById('menu-toggle');

        if (!layout || !toggle) {
          return;
        }

        toggle.addEventListener('click', function () {
          layout.classList.toggle('sidebar-open');
        });
      })();
    </script>
  </body>
</html>
