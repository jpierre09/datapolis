<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard Datapolis{% endblock %}</title>
    <style>
      :root {
        --color-primary-dark: #3E7C7B;
        --color-primary-soft: #7FB7BE;
        --color-neutral: #B7C4C7;
        --color-background: #E6E8E6;
        --color-accent: #D8A7B1;
        --color-card: #FFFFFF;
        --color-text: #1f2a2d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--color-text);
        background: var(--color-background);
      }

      .layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 270px 1fr;
      }

      .sidebar {
        background: linear-gradient(180deg, rgba(127, 183, 190, 0.18) 0%, rgba(230, 232, 230, 0.55) 100%);
        border-right: 1px solid rgba(62, 124, 123, 0.2);
        color: var(--color-text);
        padding: 20px 12px;
        transition: transform 0.24s ease;
      }

      .sidebar-header {
        padding: 8px 12px 14px;
        border-bottom: 1px solid rgba(62, 124, 123, 0.22);
        margin-bottom: 12px;
      }

      .sidebar-header h1 {
        margin: 0;
        font-size: 1.02rem;
        color: var(--color-primary-dark);
      }

      .sidebar nav {
        display: grid;
        gap: 4px;
      }

      .sidebar a,
      .sidebar span {
        text-decoration: none;
        color: #233335;
        padding: 10px 12px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: transparent;
        border-left: 3px solid transparent;
        transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: rgba(127, 183, 190, 0.2);
        border-left-color: var(--color-primary-dark);
        transform: translateX(1px);
      }

      .sidebar-link-icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .sidebar .disabled {
        opacity: 0.56;
        cursor: not-allowed;
      }

      .content-shell {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      .topbar {
        background: var(--color-card);
        border-bottom: 1px solid rgba(62, 124, 123, 0.2);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .menu-toggle {
        display: none;
        border: 1px solid var(--color-neutral);
        background: #fff;
        color: var(--color-primary-dark);
        border-radius: 8px;
        width: 38px;
        height: 34px;
        cursor: pointer;
      }

      .brand {
        font-weight: 700;
        color: var(--color-primary-dark);
      }

      .section-name {
        margin: 0;
        font-size: 1.02rem;
        color: #2f4448;
      }

      .topbar-spacer {
        flex: 1;
      }

      .avatar-slot {
        border: 1px dashed var(--color-neutral);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.82rem;
        color: #5a6f72;
        background: rgba(255, 255, 255, 0.8);
      }

      .content {
        padding: 24px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-header h2 {
        margin: 0;
        font-size: 1.7rem;
      }

      .page-header p {
        margin: 8px 0 0;
        color: #3f5559;
      }

      .card {
        background: var(--color-card);
        border: 1px solid rgba(183, 196, 199, 0.85);
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 4px 14px rgba(33, 50, 53, 0.08);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .card:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(33, 50, 53, 0.12);
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }

      .metric-label {
        margin: 0;
        color: #4a6367;
        font-size: 0.92rem;
      }

      .metric-value {
        margin: 6px 0 0;
        font-size: 1.6rem;
        color: var(--color-primary-dark);
        font-weight: 700;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }

      .chips {
        display: flex;
        flex-wrap: nowrap;
        gap: 8px;
        margin: 0;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .chip {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid var(--color-neutral);
        color: #2a3b3e;
        background: rgba(183, 196, 199, 0.4);
        white-space: nowrap;
        font-size: 0.9rem;
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }

      .chip:hover {
        background: rgba(183, 196, 199, 0.72);
      }

      .chip.active {
        background: rgba(216, 167, 177, 0.62);
        border-color: rgba(216, 167, 177, 0.92);
        color: #2f282a;
      }

      .section-title {
        margin: 22px 0 10px;
        padding-bottom: 6px;
        border-bottom: 2px solid var(--color-primary-soft);
      }

      .section-head-inline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr);
        gap: 16px;
      }

      .meta-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .meta-list strong {
        color: var(--color-primary-dark);
      }

      .quick-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .quick-links a {
        text-decoration: none;
        color: #213235;
        background: var(--color-accent);
        padding: 8px 12px;
        border-radius: 8px;
        transition: filter 0.2s ease;
      }

      .quick-links a:hover {
        filter: brightness(0.96);
      }

      .dashboard-footer {
        border-top: 1px solid rgba(62, 124, 123, 0.2);
        padding: 12px 24px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.9rem;
        color: #4a6266;
      }

      .dashboard-footer a {
        color: var(--color-primary-dark);
        text-decoration: none;
      }

      .dashboard-footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          width: 260px;
          z-index: 20;
          transform: translateX(-100%);
        }

        .layout.sidebar-open .sidebar {
          transform: translateX(0);
        }

        .menu-toggle {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }

        .chips {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Datapolis</h1>
        </div>
        <nav>
          <a href="{% url 'dashboard:overview' %}" class="{% if dashboard_section == 'overview' %}active{% endif %}">
            <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12h18"/><path d="M7 7h10"/><path d="M7 17h10"/></svg>
            Mi portafolio
          </a>
          <a href="{% url 'dashboard:project_list' %}" class="{% if dashboard_section == 'projects' %}active{% endif %}">
            <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 5h16v14H4z"/><path d="M8 9h8"/><path d="M8 13h8"/></svg>
            Proyectos
          </a>
          <a href="{% url 'dashboard:project_list' %}" class="{% if dashboard_section == 'datasets' %}active{% endif %}">
            <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><ellipse cx="12" cy="6" rx="7" ry="3"/><path d="M5 6v8c0 1.7 3.1 3 7 3s7-1.3 7-3V6"/></svg>
            Datasets
          </a>
          <a href="{% url 'portfolio_projects:project_list' %}">
            <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
            Portafolio publicado
          </a>
          <span class="disabled">
            <svg class="sidebar-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 18V6"/><path d="M10 18V9"/><path d="M16 18v-5"/><path d="M22 18v-9"/></svg>
            Analíticas (próximamente)
          </span>
        </nav>
      </aside>

      <div class="content-shell">
        <header class="topbar">
          <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/></svg>
          </button>
          <div class="brand">Datapolis</div>
          <h2 class="section-name">{% block page_title %}Dashboard{% endblock %}</h2>
          <div class="topbar-spacer"></div>
          <div class="avatar-slot">Usuario</div>
        </header>

        <main class="content">
          {% block dashboard_content %}{% endblock %}
        </main>

        <footer class="dashboard-footer">
          <span>© Datapolis 2026</span>
          <a href="{% url 'portfolio_projects:project_list' %}">Portafolio público</a>
        </footer>
      </div>
    </div>

    <script>
      (function () {
        var layout = document.querySelector('.layout');
        var toggle = document.getElementById('menu-toggle');

        if (!layout || !toggle) {
          return;
        }

        toggle.addEventListener('click', function () {
          layout.classList.toggle('sidebar-open');
        });
      })();
    </script>
  </body>
</html>
